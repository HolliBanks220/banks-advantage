<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CWC Tracker — Banks Advantage</title>
<style>
  :root {
    --navy: #1D3557;
    --teal: #138181;
    --teal-light: #1a9f9f;
    --teal-dim: #0e6060;
    --white: #ffffff;
    --off-white: #f4f7f9;
    --gray-100: #eef1f4;
    --gray-200: #dde2e8;
    --gray-400: #9aa5b4;
    --gray-600: #5a6a7a;
    --gray-800: #2d3a47;
    --danger: #c0392b;
    --danger-light: #e74c3c;
    --success: #27ae60;
    --warning: #e67e22;
    --appt-color: #8e44ad;
    --callback-color: #2980b9;
    --font-main: 'Playfair Display', Georgia, serif;
    --font-ui: 'DM Sans', 'Segoe UI', sans-serif;
    --radius: 10px;
    --shadow: 0 2px 12px rgba(29,53,87,0.10);
    --shadow-lg: 0 6px 32px rgba(29,53,87,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--off-white);
    color: var(--gray-800);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--navy);
    color: var(--white);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header h1 {
    font-family: var(--font-main);
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .header-badge {
    background: var(--teal);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .header-stats {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.75);
  }
  .header-stat strong { color: var(--white); font-size: 1rem; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .tab {
    flex: 1;
    padding: 11px 10px;
    text-align: center;
    font-size: 0.82rem;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.18s;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-size: 0.75rem;
  }
  .tab.active {
    color: var(--white);
    border-bottom-color: var(--teal);
  }
  .tab:hover:not(.active) { color: rgba(255,255,255,0.8); }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: block; }

  /* ── BOARD ── */
  .board-wrap { padding: 16px; }
  .board-columns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  @media (max-width: 700px) {
    .board-columns { grid-template-columns: 1fr; }
  }
  .board-col {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .board-col-header {
    padding: 10px 14px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .board-col-header.fresh { background: var(--teal); color: white; }
  .board-col-header.active-col { background: var(--navy); color: white; }
  .board-col-header.closed { background: var(--gray-600); color: white; }
  .board-col-count {
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    padding: 1px 8px;
    font-size: 0.7rem;
  }
  .board-cards { padding: 8px; min-height: 60px; max-height: 420px; overflow-y: auto; }
  .board-card {
    background: var(--off-white);
    border-radius: 6px;
    padding: 8px 10px;
    margin-bottom: 6px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: box-shadow 0.15s, transform 0.1s;
    font-size: 0.82rem;
  }
  .board-card:hover { box-shadow: var(--shadow); transform: translateX(2px); }
  .board-card.has-appt { border-left-color: var(--appt-color); }
  .board-card.callback { border-left-color: var(--callback-color); }
  .board-card-name { font-weight: 700; color: var(--navy); }
  .board-card-phone { color: var(--gray-600); font-size: 0.75rem; }
  .board-card-tag {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 10px;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .tag-appt { background: #f0e6fa; color: var(--appt-color); }
  .tag-callback { background: #dbeeff; color: var(--callback-color); }
  .tag-noanswer { background: var(--gray-100); color: var(--gray-600); }

  /* ── LEADS VIEW ── */
  .leads-wrap { padding: 12px 16px; }
  .leads-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .leads-search {
    flex: 1;
    min-width: 160px;
    padding: 8px 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    font-size: 0.85rem;
    font-family: var(--font-ui);
    outline: none;
    background: white;
  }
  .leads-search:focus { border-color: var(--teal); }
  .leads-filter {
    padding: 8px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: 8px;
    font-size: 0.82rem;
    font-family: var(--font-ui);
    outline: none;
    background: white;
    color: var(--gray-800);
  }
  .leads-filter:focus { border-color: var(--teal); }
  .leads-table-wrap { overflow-x: auto; }
  .leads-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .leads-table th {
    background: var(--navy);
    color: rgba(255,255,255,0.85);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .leads-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--gray-100);
    vertical-align: middle;
    white-space: nowrap;
  }
  .leads-table tr:last-child td { border-bottom: none; }
  .leads-table tr:hover td { background: var(--off-white); cursor: pointer; }
  .leads-table .name-cell { font-weight: 700; color: var(--navy); }
  .status-pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 12px;
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .pill-new { background: #e0f5f5; color: var(--teal-dim); }
  .pill-callback { background: #dbeeff; color: var(--callback-color); }
  .pill-appt { background: #f0e6fa; color: var(--appt-color); }
  .pill-notinterested { background: var(--gray-100); color: var(--gray-600); }

  /* ── LEAD DETAIL PANEL ── */
  .panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(29,53,87,0.45);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .panel-overlay.open { display: flex; }
  @media (min-width: 600px) {
    .panel-overlay { align-items: center; }
  }
  .panel {
    background: white;
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 560px;
    max-height: 92vh;
    overflow-y: auto;
    box-shadow: 0 -8px 48px rgba(29,53,87,0.22);
    padding-bottom: 20px;
  }
  @media (min-width: 600px) {
    .panel { border-radius: 16px; }
  }
  .panel-header {
    background: var(--navy);
    color: white;
    padding: 16px 20px;
    border-radius: 16px 16px 0 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  .panel-header h2 {
    font-family: var(--font-main);
    font-size: 1.15rem;
    font-weight: 700;
  }
  .panel-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .panel-close:hover { background: rgba(255,255,255,0.25); }
  .panel-body { padding: 16px 20px; }

  /* Dial section */
  .dial-section {
    background: var(--navy);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 14px;
    color: white;
  }
  .dial-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .dial-phone {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.03em;
  }
  .dial-count-wrap {
    display: flex;
    align-items: center;
    gap: 0;
    background: rgba(255,255,255,0.12);
    border-radius: 20px;
    overflow: hidden;
  }
  .dial-count-btn {
    background: none;
    border: none;
    color: white;
    width: 28px;
    height: 28px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.12s;
  }
  .dial-count-btn:hover { background: rgba(255,255,255,0.15); }
  .dial-count-label {
    font-size: 0.78rem;
    font-weight: 700;
    padding: 0 8px;
    color: rgba(255,255,255,0.9);
  }

  .disposition-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .disp-btn {
    padding: 10px 8px;
    border: none;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    font-family: var(--font-ui);
  }
  .disp-btn:hover { opacity: 0.88; transform: scale(0.98); }
  .disp-noanswer { background: rgba(255,255,255,0.15); color: white; }
  .disp-appt { background: var(--appt-color); color: white; }
  .disp-callback { background: var(--callback-color); color: white; }
  .disp-notinterested { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

  /* Lead info fields */
  .field-group { margin-bottom: 12px; }
  .field-label {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gray-400);
    margin-bottom: 4px;
  }
  .field-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .field-input {
    flex: 1;
    padding: 8px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: 7px;
    font-size: 0.88rem;
    font-family: var(--font-ui);
    outline: none;
    color: var(--gray-800);
  }
  .field-input:focus { border-color: var(--teal); }
  .field-save-btn {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 8px 12px;
    font-size: 0.78rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    font-family: var(--font-ui);
  }
  .field-save-btn:hover { background: var(--teal-light); }

  /* Appt badge */
  .appt-badge {
    background: #f0e6fa;
    border: 1.5px solid var(--appt-color);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .appt-badge-icon { font-size: 1.2rem; }
  .appt-badge-text { font-size: 0.82rem; color: var(--appt-color); }
  .appt-badge-text strong { display: block; font-size: 0.9rem; margin-bottom: 2px; }
  .appt-badge-notes { font-size: 0.78rem; color: var(--gray-600); margin-top: 2px; }

  /* Call log */
  .call-log-section h3 {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--gray-400);
    margin-bottom: 8px;
  }
  .call-log-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: var(--off-white);
    border-radius: 7px;
    margin-bottom: 5px;
    font-size: 0.78rem;
  }
  .call-log-disp {
    font-weight: 700;
    min-width: 100px;
  }
  .call-log-time { color: var(--gray-400); font-size: 0.72rem; margin-left: auto; }
  .disp-color-noanswer { color: var(--gray-600); }
  .disp-color-apptset { color: var(--appt-color); }
  .disp-color-callback { color: var(--callback-color); }
  .disp-color-notinterested { color: var(--danger); }

  /* Appt modal */
  .appt-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(29,53,87,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .appt-modal-overlay.open { display: flex; }
  .appt-modal {
    background: white;
    border-radius: 14px;
    width: 100%;
    max-width: 420px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .appt-modal-header {
    background: var(--appt-color);
    color: white;
    padding: 14px 18px;
    font-family: var(--font-main);
    font-size: 1.05rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .appt-modal-close {
    background: rgba(255,255,255,0.18);
    border: none;
    color: white;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .appt-modal-body { padding: 16px 18px; }
  .appt-modal-body .field-group { margin-bottom: 14px; }
  .appt-modal-body textarea {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--gray-200);
    border-radius: 7px;
    font-size: 0.85rem;
    font-family: var(--font-ui);
    outline: none;
    resize: vertical;
    min-height: 70px;
  }
  .appt-modal-body textarea:focus { border-color: var(--appt-color); }
  .appt-modal-footer {
    padding: 0 18px 16px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .btn-primary {
    background: var(--appt-color);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-ui);
  }
  .btn-secondary {
    background: var(--gray-100);
    color: var(--gray-600);
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-ui);
  }

  /* ── APPTS VIEW ── */
  .appts-wrap { padding: 16px; }
  .appts-section-title {
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--gray-400);
    margin-bottom: 8px;
    margin-top: 16px;
  }
  .appt-card {
    background: white;
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
    margin-bottom: 8px;
    border-left: 4px solid var(--appt-color);
    cursor: pointer;
    transition: box-shadow 0.15s;
  }
  .appt-card:hover { box-shadow: var(--shadow-lg); }
  .appt-card-name { font-weight: 700; color: var(--navy); font-size: 0.92rem; }
  .appt-card-dt { font-size: 0.8rem; color: var(--appt-color); font-weight: 600; margin-top: 2px; }
  .appt-card-notes { font-size: 0.77rem; color: var(--gray-600); margin-top: 4px; }
  .appt-card-phone { font-size: 0.77rem; color: var(--gray-400); }
  .appt-card.past { border-left-color: var(--gray-400); opacity: 0.72; }
  .empty-state {
    text-align: center;
    padding: 28px 20px;
    color: var(--gray-400);
    font-size: 0.85rem;
  }
  .empty-state-icon { font-size: 2rem; margin-bottom: 8px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--navy);
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    font-size: 0.82rem;
    font-weight: 600;
    box-shadow: var(--shadow-lg);
    z-index: 999;
    transition: transform 0.25s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Loader */
  .loader {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--gray-400);
    font-size: 0.9rem;
    gap: 8px;
  }
  .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid var(--gray-200);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 3px; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="header-badge">CWC</div>
    <h1>Banks Advantage</h1>
  </div>
  <div class="header-stats">
    <div><strong id="hdr-dials">0</strong><br>Dials Today</div>
    <div><strong id="hdr-convos">0</strong><br>Convos</div>
    <div><strong id="hdr-appts">0</strong><br>Appts</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-view="board">📋 Board</div>
  <div class="tab" data-view="leads">📞 Leads</div>
  <div class="tab" data-view="appts">📅 Appts</div>
</div>

<!-- BOARD VIEW -->
<div class="view active" id="view-board">
  <div class="board-wrap">
    <div class="board-columns">
      <div class="board-col">
        <div class="board-col-header fresh">
          <span>Fresh Leads</span>
          <span class="board-col-count" id="col-count-new">0</span>
        </div>
        <div class="board-cards" id="col-new"></div>
      </div>
      <div class="board-col">
        <div class="board-col-header active-col">
          <span>Active</span>
          <span class="board-col-count" id="col-count-active">0</span>
        </div>
        <div class="board-cards" id="col-active"></div>
      </div>
      <div class="board-col">
        <div class="board-col-header closed">
          <span>Closed Out</span>
          <span class="board-col-count" id="col-count-closed">0</span>
        </div>
        <div class="board-cards" id="col-closed"></div>
      </div>
    </div>
  </div>
</div>

<!-- LEADS VIEW -->
<div class="view" id="view-leads">
  <div class="leads-wrap">
    <div class="leads-toolbar">
      <input class="leads-search" id="leads-search" type="text" placeholder="Search name or phone…" />
      <select class="leads-filter" id="leads-filter">
        <option value="">All Statuses</option>
        <option value="new">Fresh</option>
        <option value="callback">Callback</option>
        <option value="appt">Appt Set</option>
        <option value="notinterested">Not Interested</option>
      </select>
    </div>
    <div class="leads-table-wrap">
      <table class="leads-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Dials</th>
            <th>City</th>
          </tr>
        </thead>
        <tbody id="leads-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- APPTS VIEW -->
<div class="view" id="view-appts">
  <div class="appts-wrap">
    <div class="appts-section-title">Upcoming</div>
    <div id="appts-upcoming"></div>
    <div class="appts-section-title">Past</div>
    <div id="appts-past"></div>
  </div>
</div>

<!-- LEAD DETAIL PANEL -->
<div class="panel-overlay" id="panel-overlay">
  <div class="panel" id="panel">
    <div class="panel-header">
      <h2 id="panel-name">Lead Detail</h2>
      <button class="panel-close" id="panel-close">✕</button>
    </div>

  const headers = {
    'apikey': SUPA_KEY,
    'Authorization': 'Bearer ' + SUPA_KEY,
    'Content-Type': 'application/json',

  const res = await fetch(url, Object.assign({ headers }, opts || {}));
  if (!res.ok) {
    const txt = await res.text();
    throw new Error('Supabase error: ' + res.status + ' ' + txt);
  }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json') && res.status !== 204) return res.json();

}

//  INIT

async function init() {
  showLoaders();
  try {
    await ensureSeed();
    await loadAll();
    render();
  } catch (e) {
    console.error(e);
    showToast('Connection error — check Supabase config');
  }
}

async function ensureSeed() {
  const existing = await supa('clients?select=id&limit=1');
  if (existing && existing.length > 0) return;
  // Seed in batches of 20
  for (let i = 0; i < SEED_LEADS.length; i += 20) {
    const batch = SEED_LEADS.slice(i, i + 20).map(l => ({
      first_name: l.first_name,
      last_name: l.last_name,
      phone: l.phone,
      status: l.status,
      address: l.address,
      appt_datetime: null,
      appt_notes: null
    }));
    await supa('clients', {
      method: 'POST',
      body: JSON.stringify(batch)
    });
  }
}

async function loadAll() {
  const [l, s] = await Promise.all([
    supa('clients?select=*&order=id.asc'),
    supa('stats?select=*&order=created_at.desc&limit=500')
  ]);
  leads = l || [];
  stats = s || [];
}

function showLoaders() {
  ['col-new', 'col-active', 'col-closed', 'leads-tbody'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<div class="loader"><div class="spinner"></div> Loading…</div>';
  });
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  renderBoard();
  renderLeadsTable();
  renderAppts();
  renderHeaderStats();
}

function fullName(l) {
  return ((l.first_name || '') + ' ' + (l.last_name || '')).trim() || '—';
}

function cityFromAddress(addr) {
  if (!addr) return '';
  const parts = addr.split(',');
  return parts.length > 1 ? parts[1].trim() : '';
}

// Board
function renderBoard() {
  const cols = { new: [], callback: [], appt: [], notinterested: [] };
  leads.forEach(l => {
    const s = l.status || 'new';
    if (s === 'new') cols.new.push(l);
    else if (s === 'callback') cols.callback.push(l);
    else if (s === 'appt') cols.appt.push(l);
    else if (s === 'notinterested') cols.notinterested.push(l);
    else cols.new.push(l);
  });

  const fresh = [...cols.new];
  const active = [...cols.callback, ...cols.appt];
  const closed = [...cols.notinterested];

  renderBoardCol('col-new', fresh);
  renderBoardCol('col-active', active);
  renderBoardCol('col-closed', closed);

  document.getElementById('col-count-new').textContent = fresh.length;
  document.getElementById('col-count-active').textContent = active.length;
  document.getElementById('col-count-closed').textContent = closed.length;
}

function renderBoardCol(id, items) {
  const el = document.getElementById(id);
  if (!items.length) {
    el.innerHTML = '<div style="padding:12px;color:#9aa5b4;font-size:0.78rem;text-align:center">None</div>';
    return;
  }
  el.innerHTML = items.map(l => {
    const s = l.status || 'new';
    let tag = '';
    let cls = '';
    if (s === 'appt') { tag = '<span class="board-card-tag tag-appt">Appt</span>'; cls = 'has-appt'; }
    else if (s === 'callback') { tag = '<span class="board-card-tag tag-callback">Callback</span>'; cls = 'callback'; }
    const dialCount = dialCountForLead(l.id);
    return '<div class="board-card ' + cls + '" data-id="' + l.id + '">' +
      '<div class="board-card-name">' + esc(fullName(l)) + '</div>' +
      '<div class="board-card-phone">' + esc(l.phone || '') + (dialCount ? ' &bull; ' + dialCount + ' dial' + (dialCount !== 1 ? 's' : '') : '') + '</div>' +
      tag +
      '</div>';
  }).join('');
}

function dialCountForLead(id) {
  return stats.filter(s => String(s.lead_id) === String(id)).length;
}

// Leads table
function renderLeadsTable() {
  const search = (document.getElementById('leads-search').value || '').toLowerCase();
  const filter = document.getElementById('leads-filter').value;
  let filtered = leads;
  if (search) {
    filtered = filtered.filter(l =>
      fullName(l).toLowerCase().includes(search) ||
      (l.phone || '').includes(search)
    );
  }
  if (filter) {
    filtered = filtered.filter(l => (l.status || 'new') === filter);
  }

  const tbody = document.getElementById('leads-tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#9aa5b4;padding:24px">No leads found</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(l => {
    const s = l.status || 'new';
    const pillMap = { new: 'pill-new', callback: 'pill-callback', appt: 'pill-appt', notinterested: 'pill-notinterested' };
    const pillLbl = { new: 'Fresh', callback: 'Callback', appt: 'Appt Set', notinterested: 'Not Interested' };
    const dials = dialCountForLead(l.id);
    return '<tr data-id="' + l.id + '">' +
      '<td class="name-cell">' + esc(fullName(l)) + '</td>' +
      '<td>' + esc(l.phone || '') + '</td>' +
      '<td><span class="status-pill ' + (pillMap[s] || 'pill-new') + '">' + (pillLbl[s] || s) + '</span></td>' +
      '<td>' + (dials || '—') + '</td>' +
      '<td>' + esc(cityFromAddress(l.address)) + '</td>' +
      '</tr>';
  }).join('');
}

// Appts
function renderAppts() {
  const now = new Date();
  const withAppt = leads.filter(l => l.appt_datetime);
  withAppt.sort((a, b) => new Date(a.appt_datetime) - new Date(b.appt_datetime));
  const upcoming = withAppt.filter(l => new Date(l.appt_datetime) >= now);
  const past = withAppt.filter(l => new Date(l.appt_datetime) < now);

  const upEl = document.getElementById('appts-upcoming');
  const pastEl = document.getElementById('appts-past');

  upEl.innerHTML = upcoming.length ? upcoming.map(l => apptCard(l, false)).join('') :
    '<div class="empty-state"><div class="empty-state-icon">📅</div>No upcoming appointments</div>';
  pastEl.innerHTML = past.length ? past.map(l => apptCard(l, true)).join('') :
    '<div class="empty-state"><div class="empty-state-icon">📋</div>No past appointments</div>';
}

function apptCard(l, isPast) {
  const dt = new Date(l.appt_datetime);
  const dtStr = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
    ' at ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  return '<div class="appt-card ' + (isPast ? 'past' : '') + '" data-id="' + l.id + '">' +
    '<div class="appt-card-name">' + esc(fullName(l)) + '</div>' +
    '<div class="appt-card-dt">' + dtStr + '</div>' +
    (l.appt_notes ? '<div class="appt-card-notes">' + esc(l.appt_notes) + '</div>' : '') +
    '<div class="appt-card-phone">' + esc(l.phone || '') + '</div>' +
    '</div>';
}

// Header stats
function renderHeaderStats() {
  const today = new Date().toDateString();
  const todayStats = stats.filter(s => new Date(s.created_at).toDateString() === today);
  const dials = todayStats.length;
  const convos = todayStats.filter(s => s.disposition !== 'noanswer').length;
  const appts = leads.filter(l => l.status === 'appt').length;
  document.getElementById('hdr-dials').textContent = dials;
  document.getElementById('hdr-convos').textContent = convos;
  document.getElementById('hdr-appts').textContent = appts;
}

// ═══════════════════════════════════════════════════════
function openPanel(id) {
  const lead = leads.find(l => String(l.id) === String(id));
  if (!lead) return;
  currentLeadId = lead.id;
  currentDialCount = 1;

  document.getElementById('panel-name').textContent = fullName(lead);
  document.getElementById('panel-phone').textContent = lead.phone || '—';
  document.getElementById('edit-name').value = fullName(lead);
  document.getElementById('edit-phone').value = lead.phone || '';
  document.getElementById('edit-address').value = lead.address || '';
  document.getElementById('dial-count-label').textContent = '1\u00d7';

  // Appt badge
  const badge = document.getElementById('appt-badge');
  if (lead.appt_datetime) {
    const dt = new Date(lead.appt_datetime);
    const dtStr = dt.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }) +
      ' at ' + dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    document.getElementById('appt-badge-dt').textContent = dtStr;
    document.getElementById('appt-badge-notes').textContent = lead.appt_notes || '';
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }

  // Call log
  renderCallLog(lead.id);

  document.getElementById('panel-overlay').classList.add('open');
}

function renderCallLog(id) {
  const leadStats = stats.filter(s => String(s.lead_id) === String(id));
  const list = document.getElementById('call-log-list');
  if (!leadStats.length) {
    list.innerHTML = '<div style="color:#9aa5b4;font-size:0.78rem;padding:8px 0">No calls logged yet</div>';
    return;
  }
  const dispLabel = { noanswer: 'No Answer', apptset: 'Appt Set', callback: 'Callback', notinterested: 'Not Interested' };
  const dispClass = { noanswer: 'disp-color-noanswer', apptset: 'disp-color-apptset', callback: 'disp-color-callback', notinterested: 'disp-color-notinterested' };
  list.innerHTML = leadStats.map(s => {
    const dt = new Date(s.created_at);
    const dtStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' +
      dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const d = s.disposition || 'noanswer';
    return '<div class="call-log-item">' +
      '<span class="call-log-disp ' + (dispClass[d] || '') + '">' + (dispLabel[d] || d) + '</span>' +
      '<span class="call-log-time">' + dtStr + '</span>' +
      '</div>';
  }).join('');
}

function closePanel() {
  document.getElementById('panel-overlay').classList.remove('open');
  currentLeadId = null;
}

// ═══════════════════════════════════════════════════════
//  DISPOSITION
// ═══════════════════════════════════════════════════════
async function handleDisposition(disp) {
  if (!currentLeadId) return;
  const lead = leads.find(l => String(l.id) === String(currentLeadId));
  if (!lead) return;

  // Log stat rows — one per dial count
  const statRows = [];
  for (let i = 0; i < currentDialCount; i++) {
    statRows.push({ lead_id: currentLeadId, disposition: disp });
  }
  try {
    await supa('stats', { method: 'POST', body: JSON.stringify(statRows) });
    stats = [...statRows.map(r => ({ ...r, created_at: new Date().toISOString() })), ...stats];
  } catch (e) {
    showToast('Error logging stat');
    console.error(e);
  }

  if (disp === 'noanswer') {
    showToast('Logged — no answer');
    renderCallLog(currentLeadId);
    renderHeaderStats();
    renderBoard();
    return;
  }

  // Non-no-answer: update status + count convo
  let newStatus = lead.status;
  if (disp === 'apptset') {
    // open appt modal before advancing
    openApptModal();
    return;
  } else if (disp === 'callback') {
    newStatus = 'callback';
  } else if (disp === 'notinterested') {
    newStatus = 'notinterested';
  }

  try {
    await supa('clients?id=eq.' + currentLeadId, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus })
    });
    lead.status = newStatus;
  } catch (e) { console.error(e); }

  showToast(disp === 'callback' ? 'Callback set' : 'Marked not interested');
  render();
  closePanel();
  advanceToNextLead(currentLeadId);
}

function advanceToNextLead(fromId) {
  // open next new lead if available
  const idx = leads.findIndex(l => String(l.id) === String(fromId));
  const next = leads.slice(idx + 1).find(l => l.status === 'new');
  if (next) setTimeout(() => openPanel(next.id), 400);
}

// ═══════════════════════════════════════════════════════
//  APPT MODAL
// ═══════════════════════════════════════════════════════
function openApptModal() {
  const now = new Date();
  now.setMinutes(Math.ceil(now.getMinutes() / 15) * 15, 0, 0);
  const pad = n => String(n).padStart(2, '0');
  const local = now.getFullYear() + '-' + pad(now.getMonth() + 1) + '-' + pad(now.getDate()) +
    'T' + pad(now.getHours()) + ':' + pad(now.getMinutes());
  document.getElementById('appt-datetime').value = local;
  document.getElementById('appt-notes').value = '';
  document.getElementById('appt-modal-overlay').classList.add('open');
}

function closeApptModal() {
  document.getElementById('appt-modal-overlay').classList.remove('open');
}

async function saveAppt() {
  const dt = document.getElementById('appt-datetime').value;
  const notes = document.getElementById('appt-notes').value;
  if (!dt) { showToast('Please pick a date and time'); return; }
  const lead = leads.find(l => String(l.id) === String(currentLeadId));
  if (!lead) return;

  try {
    await supa('clients?id=eq.' + currentLeadId, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'appt', appt_datetime: new Date(dt).toISOString(), appt_notes: notes })
    });
    lead.status = 'appt';
    lead.appt_datetime = new Date(dt).toISOString();
    lead.appt_notes = notes;
    showToast('Appointment saved!');
  } catch (e) { showToast('Error saving appointment'); console.error(e); return; }

  closeApptModal();
  render();
  const savId = currentLeadId;
  closePanel();
  advanceToNextLead(savId);
}

// ═══════════════════════════════════════════════════════
//  INLINE EDIT
// ═══════════════════════════════════════════════════════
async function saveName() {
  if (!currentLeadId) return;
  const val = document.getElementById('edit-name').value.trim();
  if (!val) return;
  const parts = val.split(' ');
  const first = parts[0];
  const last = parts.slice(1).join(' ');
  try {
    await supa('clients?id=eq.' + currentLeadId, {
      method: 'PATCH',
      body: JSON.stringify({ first_name: first, last_name: last })
    });
    const lead = leads.find(l => String(l.id) === String(currentLeadId));
    if (lead) { lead.first_name = first; lead.last_name = last; }
    document.getElementById('panel-name').textContent = val;
    renderBoard();
    renderLeadsTable();
    showToast('Name updated');
  } catch (e) { showToast('Error updating name'); }
}

async function savePhone() {
  if (!currentLeadId) return;
  const val = document.getElementById('edit-phone').value.trim();
  if (!val) return;
  try {
    await supa('clients?id=eq.' + currentLeadId, {
      method: 'PATCH',
      body: JSON.stringify({ phone: val })
    });
    const lead = leads.find(l => String(l.id) === String(currentLeadId));
    if (lead) lead.phone = val;
    document.getElementById('panel-phone').textContent = val;
    renderBoard();
    renderLeadsTable();
    showToast('Phone updated');
  } catch (e) { showToast('Error updating phone'); }
}

async function saveAddress() {
  if (!currentLeadId) return;
  const val = document.getElementById('edit-address').value.trim();
  try {
    await supa('clients?id=eq.' + currentLeadId, {
      method: 'PATCH',
      body: JSON.stringify({ address: val })
    });
    const lead = leads.find(l => String(l.id) === String(currentLeadId));
    if (lead) lead.address = val;
    showToast('Address updated');
  } catch (e) { showToast('Error updating address'); }
}

// ═══════════════════════════════════════════════════════
//  DIAL COUNT (exposed globally for dialer)
// ═══════════════════════════════════════════════════════
window.setDialCount = function(n) {
  if (n < 1) n = 1;
  if (n > 9) n = 9;
  currentDialCount = n;
  document.getElementById('dial-count-label').textContent = n + '\u00d7';
};

function incDial() { window.setDialCount(currentDialCount + 1); }
function decDial() { window.setDialCount(currentDialCount - 1); }

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

// ═══════════════════════════════════════════════════════
//  UTILITY
// ═══════════════════════════════════════════════════════
function esc(str) {
  return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ═══════════════════════════════════════════════════════
//  EVENT LISTENERS
// ═══════════════════════════════════════════════════════
// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
    if (tab.dataset.view === 'appts') renderAppts();
    if (tab.dataset.view === 'leads') renderLeadsTable();
  });
});

// Board card clicks
document.getElementById('col-new').addEventListener('click', e => {
  const card = e.target.closest('[data-id]');
  if (card) openPanel(card.dataset.id);
});
document.getElementById('col-active').addEventListener('click', e => {
  const card = e.target.closest('[data-id]');
  if (card) openPanel(card.dataset.id);
});
document.getElementById('col-closed').addEventListener('click', e => {
  const card = e.target.closest('[data-id]');
  if (card) openPanel(card.dataset.id);
});

// Leads table clicks
document.getElementById('leads-tbody').addEventListener('click', e => {
  const row = e.target.closest('[data-id]');
  if (row) openPanel(row.dataset.id);
});

// Appts clicks
document.getElementById('appts-upcoming').addEventListener('click', e => {
  const card = e.target.closest('[data-id]');
  if (card) openPanel(card.dataset.id);
});
document.getElementById('appts-past').addEventListener('click', e => {
  const card = e.target.closest('[data-id]');
  if (card) openPanel(card.dataset.id);
});

// Panel close
document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('panel-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('panel-overlay')) closePanel();
});

// Dispositions
document.querySelectorAll('.disp-btn').forEach(btn => {
  btn.addEventListener('click', () => handleDisposition(btn.dataset.disp));
});

// Dial count
document.getElementById('dial-inc').addEventListener('click', incDial);
document.getElementById('dial-dec').addEventListener('click', decDial);

// Save buttons
document.getElementById('save-name').addEventListener('click', saveName);
document.getElementById('save-phone').addEventListener('click', savePhone);
document.getElementById('save-address').addEventListener('click', saveAddress);

// Appt modal
document.getElementById('appt-modal-close').addEventListener('click', closeApptModal);
document.getElementById('appt-modal-cancel').addEventListener('click', closeApptModal);
document.getElementById('appt-modal-save').addEventListener('click', saveAppt);
document.getElementById('appt-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('appt-modal-overlay')) closeApptModal();
});

// Search/filter
document.getElementById('leads-search').addEventListener('input', renderLeadsTable);
document.getElementById('leads-filter').addEventListener('change', renderLeadsTable);

// ═══════════════════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════════════════
init();
</script>
